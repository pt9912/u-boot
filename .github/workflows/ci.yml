name: ci

# CI-Pipeline gemäß LH-QA-003 / ADR-0004 / ADR-0007 (image-scan via
# slice-v1-release-pipeline T3).
#
# Drei parallele Jobs (analog k-deskflight ADR 0012 §2.11, erweitert):
#   - gates           : Inner-Loop-Pflichten (lint + test + coverage-gate) — `make gates`.
#   - security-gates  : govulncheck — `make govulncheck`.
#   - image-scan      : Trivy HIGH+CRITICAL gegen das Runtime-Image — `make image-scan` lokal.
#
# Alle drei Jobs sind PR-blockierend. Required-Status-Checks werden im
# GitHub-UI nach dem ersten grünen Lauf konfiguriert (Settings →
# Branches → Branch protection rules → `main`); die exakten Display-
# Namen sind die verbose `name:`-Felder der Jobs, nicht die kurzen
# `jobs.<key>`-Identifier (siehe `docs/user/branch-protection.md`).
#
# Docker-only-Pfad (LH-FA-BUILD-007): alle Werkzeuge laufen über
# `docker build --target <stage>`, sodass der CI-Runner keine
# Go-Toolchain installieren muss — er braucht nur das vorinstallierte
# Docker + BuildKit auf `ubuntu-latest`.
#
# Action-Pinning (Supply-Chain-Härtung): alle `uses:`-Einträge sind
# SHA-gepinnt mit Tag-Kommentar. Pin-Hebung ist Routine; neuen Commit-
# SHA via `gh api repos/<owner>/<repo>/git/refs/tags/<tag>` auflösen
# und Tag-Kommentar mitführen.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Top-level permissions: explizit alles entziehen. Jeder Job lockert
# auf das, was er braucht (Defense-in-Depth gegen versehentlich neu
# hinzukommende Steps, die schreibende Tokens nutzen würden).
permissions: {}

jobs:
  gates:
    name: gates (lint + test + coverage-gate)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      DOCKER_BUILDKIT: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run make gates
        run: make gates

  security-gates:
    name: security-gates (govulncheck)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      DOCKER_BUILDKIT: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run make govulncheck
        run: make govulncheck

  image-scan:
    name: image-scan (trivy HIGH+CRITICAL)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      DOCKER_BUILDKIT: '1'
      # LOCAL_IMAGE muss zum Makefile-Default `IMAGE ?= u-boot`
      # passen — `make build` taggt `$(IMAGE):latest` lokal, und
      # der Trivy-Scan löst das Tag über den Host-Docker-Daemon auf.
      LOCAL_IMAGE: u-boot
    # Dritter PR-blockierender Job (slice-v1-release-pipeline T3):
    # baut das Runtime-Image und scannt es mit Trivy. Lebenszyklus
    # bewusst identisch zu `gates`/`security-gates` — gleicher
    # Trigger, gleiche Branch-Protection-Aufnahme. Eigener Workflow
    # wäre ein zweiter Lebenszyklus für ein Defense-in-Depth-Tool,
    # das ohnehin auf dem `make build`-Artefakt aufsetzt.
    #
    # Default-Severity-Schwelle gemäß slice-AC: HIGH und CRITICAL
    # brechen den Build. Findings ohne verfügbaren Fix werden
    # bewusst nicht ignoriert; Auswertung pro Finding statt
    # Sammel-Carveout.
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build runtime image
        run: make build

      - name: Trivy scan (image)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'image'
          image-ref: '${{ env.LOCAL_IMAGE }}:latest'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          format: 'table'
          # Trivy-Version explizit pinnen statt sich auf den
          # Action-Default zu verlassen — Makefile-Default
          # `TRIVY_VERSION ?= 0.70.0` muss dem hier matchen,
          # damit `make image-scan` lokal denselben Detector-Code-
          # Pfad nimmt wie der CI-Job (Inner-/Outer-Loop-Parität).
          trivy-version: 'v0.70.0'
