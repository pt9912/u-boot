# golangci-lint configuration for u-boot (v2 schema).
#
# MVP-Bootstrap profile: the 5 default linters + depguard, with one
# pragmatic exception for fmt.Fprint* (CLI writes to stdout/stderr
# cannot meaningfully fail in this codebase and would otherwise force
# `_, _ =`-prefixes on every Fprintln).
#
# depguard is enabled with an empty rules map during the bootstrap
# phase (analog to k-deskflight Slice M1). The concrete layer-rule
# blocks from spec/architecture.md §4 (LH-FA-ARCH-003) will be wired
# in with the first productive package under ./internal/... (M3 init
# slice). //nolint:depguard is forbidden; carveouts go here with a
# `Why:` comment.

version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - depguard

  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Fprint

    depguard:
      # Layer rules will be filled in with the first productive package
      # under ./internal/... (M3 slice). Schema reference:
      # spec/architecture.md §4 (LH-FA-ARCH-003).
      rules: {}
