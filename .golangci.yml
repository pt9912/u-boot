# golangci-lint configuration for u-boot (v2 schema).
#
# Profile: 5 Default-Linter + 24 SOLID-nahe Linter + depguard.
# Source of truth for the linter list and thresholds:
# docs/user/quality.md §1.2 / §1.3 (LH-QA-004); rationale in
# docs/plan/adr/0003-solid-nahes-lint-profil.md.
#
# Hard rule: //nolint pragmas are forbidden. Pro-path carveouts go
# below under `issues.exclude-rules` with a `Why:` comment — those
# are not suppressions, they are deliberate scope decisions.

version: "2"

linters:
  default: none
  enable:
    # 5 Default-Linter (LH-QA-004)
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # 24 SOLID-nahe Linter (docs/user/quality.md §1.2)
    - containedctx
    - contextcheck
    - cyclop
    - depguard
    - dupl
    - fatcontext
    - forbidigo
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - gocyclo
    - gomodguard_v2
    - iface
    - inamedparam
    - interfacebloat
    - ireturn
    - maintidx
    - nestif
    - noctx
    - reassign
    - revive
    - testpackage
    - unparam

  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Fprint

    cyclop:
      max-complexity: 15

    dupl:
      threshold: 150

    forbidigo:
      forbid:
        - pattern: ^fmt\.Print.*$
          msg: use the logging port at internal/hexagon/port/driven (driven.Logger) (LH-QA-004)

    funlen:
      lines: 100
      statements: 60

    gocognit:
      min-complexity: 20

    gocyclo:
      min-complexity: 15

    interfacebloat:
      max: 10

    ireturn:
      # Allow returning interface types from the standard library, from
      # generic functions, anonymous interfaces, and from u-boot ports
      # (driving/driven). Concrete types are still preferred where the
      # caller does not need an abstraction.
      allow:
        - error
        - empty
        - anon
        - stdlib
        - generic
        - github.com/pt9912/u-boot/internal/hexagon/port/driving\..*
        - github.com/pt9912/u-boot/internal/hexagon/port/driven\..*

    maintidx:
      under: 20

    nestif:
      min-complexity: 5

    revive:
      # Explicit rule-block per ADR-0006 (revive Custom-Rules-Profil).
      # golangci-lint's revive: if `rules:` is set, the listed rules
      # are the ONLY rules — the default rule set is NOT layered
      # underneath. So this block enumerates revive's default 24
      # rules (the ones running before this slice landed) PLUS one
      # project-specific extra (`unused-receiver`).
      #
      # Adding a rule here is a deliberate policy choice; the
      # `Why:`-form of justification is the commit body for the ADR
      # bump rather than per-rule comments — keeping the YAML
      # readable without losing traceability.
      rules:
        # --- revive default rule set (preserved) ---
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: empty-block
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: exported
        - name: if-return
        - name: increment-decrement
        - name: indent-error-flow
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: unused-parameter
        - name: var-declaration
        - name: var-naming
        # --- project-specific extras (ADR-0006) ---
        - name: unused-receiver

    gomodguard_v2:
      # Blocked modules per LH-QA-004 — keep the third-party surface
      # tight and aligned with the project's stdlib-first decisions.
      # v2 schema: `blocked` is a flat list of {module, recommendations,
      # reason} objects. Add a row whenever a new "anti-module" becomes
      # plausible.
      blocked:
        - module: gopkg.in/yaml.v2
          recommendations:
            - gopkg.in/yaml.v3
          reason: "v2 is feature-frozen; the project standardized on v3 with M3-T1 (driven YAML codec adapter)."
        - module: github.com/pkg/errors
          recommendations:
            - errors
            - fmt
          reason: "stdlib (errors.Is/As/Unwrap + wrap-aware fmt.Errorf) covers all pkg/errors features since Go 1.13."
        - module: github.com/sirupsen/logrus
          recommendations:
            - log/slog
          reason: "Project standardizes on log/slog via the driven.Logger port; production binary uses the slog adapter at internal/adapter/driven/logger."
        - module: go.uber.org/zap
          recommendations:
            - log/slog
          reason: "Same baseline as logrus — slog is the stdlib logging standard, abstracted via driven.Logger."

    depguard:
      # Layer rules per LH-FA-ARCH-003 / spec/architecture.md §4.
      # Match production code only (`!**/*_test.go`); tests can use
      # fakes and test libraries freely.
      rules:
        domain-isoliert:
          list-mode: lax
          files:
            - '!**/*_test.go'
            - '**/internal/hexagon/domain/**'
          deny:
            - pkg: github.com/pt9912/u-boot/internal/hexagon/application
              desc: domain must not depend on application (LH-FA-ARCH-003)
            - pkg: github.com/pt9912/u-boot/internal/hexagon/port
              desc: domain must not depend on port (LH-FA-ARCH-003)
            - pkg: github.com/pt9912/u-boot/internal/adapter
              desc: domain must not depend on adapter (LH-FA-ARCH-003)

        application-no-adapter:
          list-mode: lax
          files:
            - '!**/*_test.go'
            - '**/internal/hexagon/application/**'
          deny:
            - pkg: github.com/pt9912/u-boot/internal/adapter
              desc: application must depend on ports, not on adapter implementations (LH-FA-ARCH-003)

        application-no-net:
          list-mode: lax
          files:
            - '!**/*_test.go'
            - '**/internal/hexagon/application/**'
          deny:
            - pkg: net
              desc: application must not depend on net stdlib (the rule blocks the entire net/* family — net, net/http, net/url, net/textproto, …) — use port/driven.NetProbe for TCP-reachability and a future HTTP-driving-adapter slice for HTTP (LH-FA-ARCH-003)

        port-no-application:
          list-mode: lax
          files:
            - '!**/*_test.go'
            - '**/internal/hexagon/port/**'
          deny:
            - pkg: github.com/pt9912/u-boot/internal/hexagon/application
              desc: port must not depend on application (LH-FA-ARCH-003)
            - pkg: github.com/pt9912/u-boot/internal/adapter
              desc: port must not depend on adapter (LH-FA-ARCH-003)

        port-driving-no-driven:
          list-mode: lax
          files:
            - '!**/*_test.go'
            - '**/internal/hexagon/port/driving/**'
          deny:
            - pkg: github.com/pt9912/u-boot/internal/hexagon/port/driven
              desc: driving port must not depend on driven port (LH-FA-ARCH-003)

        port-driven-no-driving:
          list-mode: lax
          files:
            - '!**/*_test.go'
            - '**/internal/hexagon/port/driven/**'
          deny:
            - pkg: github.com/pt9912/u-boot/internal/hexagon/port/driving
              desc: driven port must not depend on driving port (LH-FA-ARCH-003)

        adapter-no-application:
          list-mode: lax
          files:
            - '!**/*_test.go'
            - '**/internal/adapter/**'
          deny:
            - pkg: github.com/pt9912/u-boot/internal/hexagon/application
              desc: adapter must implement ports, not consume application (LH-FA-ARCH-003)

        adapter-driving-no-driven:
          list-mode: lax
          files:
            - '!**/*_test.go'
            - '**/internal/adapter/driving/**'
          deny:
            - pkg: github.com/pt9912/u-boot/internal/adapter/driven
              desc: driving adapter must not depend on driven adapter — wire via cmd/uboot (LH-FA-ARCH-003)

        adapter-driven-no-driving:
          list-mode: lax
          files:
            - '!**/*_test.go'
            - '**/internal/adapter/driven/**'
          deny:
            - pkg: github.com/pt9912/u-boot/internal/adapter/driving
              desc: driven adapter must not depend on driving adapter (LH-FA-ARCH-003)

  exclusions:
    generated: lax
    rules:
      # Why: table-driven tests legitimately have higher complexity
      # without indicating design smell.
      - linters:
          - cyclop
          - gocognit
          - gocyclo
          - nestif
          - funlen
        path: _test\.go$

      # Why: tests against fakes/httptest.Server commonly miss ctx,
      # unused params (`always receives ...`) and similar without
      # design implications.
      - linters:
          - noctx
          - unparam
        path: _test\.go$

      - linters:
          - revive
        path: _test\.go$
        text: ^unused-parameter

      # Why: Test-Fakes haben oft stateless Methoden (Interface-
      # Implementierungen, die nicht alle Methoden brauchen). Den
      # `unused-receiver`-Check für Tests aufweichen, gleicher Grund
      # wie bei `unused-parameter` oben.
      - linters:
          - revive
        path: _test\.go$
        text: ^unused-receiver

      # Why: driven.FileSystem ist die zentrale FS-Abstraktion und
      # bedient die LH-FA-INIT-005-Backup-Mechanik in ihrer ganzen
      # Breite (Exists/Lstat/Read/Write/WriteExclusive/Mkdir/MkdirAll/
      # ReadDir/RemoveAll/Rename/Copy/CopyExclusive). Eine künstliche
      # Aufspaltung würde Test-Fakes verkomplizieren ohne semantischen
      # Mehrwert; das interfacebloat-Limit (10) bewusst aufgeweicht
      # für genau diese eine Schnittstelle. Andere Ports bleiben unter
      # dem Limit.
      - linters:
          - interfacebloat
        path: internal/hexagon/port/driven/filesystem\.go$

      # Why: cmd/uboot/ is the wiring layer — it must be `package main`
      # (so testpackage cannot enforce external _test packages), and
      # `var version` is the canonical pattern for `-ldflags`-overridden
      # build metadata.
      - linters:
          - testpackage
          - gochecknoglobals
        path: cmd/uboot/

      # Why: Cobra's RunE signature is `func(cmd *cobra.Command, args
      # []string) error` — no context parameter. The driving CLI
      # adapter must call `cmd.Context()` and pass that into the
      # use-case; contextcheck cannot see through the closure boundary
      # and flags it as missing propagation. Strict propagation
      # happens one level down in runInit (LH-FA-ARCH-003); the closure
      # itself is structurally required by Cobra.
      - linters:
          - contextcheck
        path: internal/adapter/driving/cli/
